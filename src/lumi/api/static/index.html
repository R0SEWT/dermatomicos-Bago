<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lumi · demo</title>
<style>
  :root {
    --teal: #0f766e; --teal-d: #115e59; --bg: #eae6df; --wa: #d9fdd3;
    --ink: #1f2937; --muted: #6b7280; --line: #e5e7eb; --card: #ffffff;
    --green: #16a34a; --amber: #d97706; --red: #dc2626;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 system-ui, -apple-system, Segoe UI, sans-serif;
         color: var(--ink); background: #f3f4f6; }
  header.top { display: flex; align-items: center; justify-content: space-between;
    background: var(--teal); color: #fff; padding: .7rem 1rem; }
  header.top h1 { font-size: 1.05rem; margin: 0; font-weight: 600; letter-spacing: .2px; }
  header.top .sub { font-size: .78rem; opacity: .85; }
  header.top button { background: rgba(255,255,255,.16); color: #fff; border: 0;
    padding: .4rem .7rem; border-radius: 6px; cursor: pointer; font-size: .8rem; }
  header.top button:hover { background: rgba(255,255,255,.28); }
  .layout { display: grid; grid-template-columns: minmax(320px, 420px) 1fr; gap: 0;
    height: calc(100vh - 52px); }
  /* Chat column */
  .chat { display: flex; flex-direction: column; border-right: 1px solid var(--line);
    background: var(--bg); }
  .chat .stream { flex: 1; overflow-y: auto; padding: 1rem; }
  .bubble { max-width: 80%; padding: .5rem .7rem; border-radius: 10px; margin: .35rem 0;
    box-shadow: 0 1px 1px rgba(0,0,0,.08); white-space: pre-wrap; font-size: .92rem; }
  .bubble.caregiver { background: var(--wa); margin-left: auto; border-top-right-radius: 2px; }
  .bubble.lumi { background: #fff; margin-right: auto; border-top-left-radius: 2px; }
  .bubble .who { font-size: .68rem; color: var(--muted); margin-bottom: .15rem; }
  .composer { padding: .6rem; background: #f0f0f0; border-top: 1px solid var(--line); }
  .chips { display: flex; flex-wrap: wrap; gap: .35rem; margin-bottom: .5rem; }
  .chip { background: #fff; border: 1px solid var(--line); border-radius: 14px;
    padding: .25rem .6rem; font-size: .76rem; cursor: pointer; color: var(--teal-d); }
  .chip:hover { background: var(--wa); }
  .composer form { display: flex; gap: .5rem; }
  .composer input { flex: 1; border: 1px solid var(--line); border-radius: 18px;
    padding: .55rem .9rem; font-size: .9rem; }
  .composer button { background: var(--teal); color: #fff; border: 0; border-radius: 18px;
    padding: 0 1rem; cursor: pointer; }
  /* Panel column */
  .panel { overflow-y: auto; padding: 1rem 1.2rem; background: #f9fafb; }
  .panel h2 { font-size: .82rem; text-transform: uppercase; letter-spacing: .5px;
    color: var(--muted); margin: 0 0 .8rem; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: .8rem .9rem; margin-bottom: .8rem; }
  .card .title { font-size: .72rem; text-transform: uppercase; letter-spacing: .4px;
    color: var(--muted); margin-bottom: .5rem; display: flex; justify-content: space-between; }
  .pill { font-size: .68rem; background: #ecfdf5; color: var(--teal-d);
    border-radius: 10px; padding: .1rem .5rem; }
  ul.clean { list-style: none; margin: 0; padding: 0; }
  ul.clean li { padding: .2rem 0; font-size: .9rem; }
  .adh { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; }
  .adh .bar { flex: 1; height: 8px; background: #eef2f7; border-radius: 5px; overflow: hidden; }
  .adh .bar > span { display: block; height: 100%; background: var(--teal); }
  .adh .lbl { font-size: .85rem; flex: 1.4; }
  .adh .n { font-size: .78rem; color: var(--muted); width: 78px; text-align: right; }
  .semaforo { display: flex; align-items: center; gap: .6rem; }
  .dot { width: 14px; height: 14px; border-radius: 50%; flex: none; }
  .dot.green { background: var(--green); } .dot.amber { background: var(--amber); }
  .dot.red { background: var(--red); }
  .semaforo .txt { font-size: .9rem; }
  .pattern { border-left: 3px solid var(--amber); padding: .35rem .6rem; margin: .4rem 0;
    background: #fffbeb; border-radius: 0 6px 6px 0; font-size: .9rem; }
  .pattern .tag { font-size: .66rem; color: var(--amber); text-transform: uppercase;
    letter-spacing: .4px; display: block; margin-bottom: .15rem; }
  .spark { display: flex; align-items: flex-end; gap: 3px; height: 38px; margin-top: .3rem; }
  .spark > span { flex: 1; background: var(--teal); border-radius: 2px 2px 0 0; min-height: 3px; }
  .evrow { font-size: .82rem; color: var(--ink); padding: .15rem 0; }
  .evrow .d { color: var(--muted); }
  .muted { color: var(--muted); font-size: .85rem; }
  .reportbtn { display: inline-block; background: var(--teal); color: #fff;
    text-decoration: none; padding: .5rem .9rem; border-radius: 8px; font-size: .85rem; }
  .disc { font-size: .72rem; color: var(--muted); margin-top: .6rem; }
</style>
</head>
<body>
<header class="top">
  <div>
    <h1>Lumi</h1>
    <div class="sub">El cuidador observa · Lumi entiende · el médico decide</div>
  </div>
  <div>
    <span id="aiflag" class="sub" style="margin-right:.6rem"></span>
    <button id="reset">Reiniciar demo</button>
  </div>
</header>

<div class="layout">
  <!-- Chat -->
  <section class="chat">
    <div class="stream" id="stream"></div>
    <div class="composer">
      <div class="chips" id="chips"></div>
      <form id="form">
        <input id="text" autocomplete="off" placeholder="Escribe como en WhatsApp…" />
        <button type="submit">➤</button>
      </form>
    </div>
  </section>

  <!-- Clinical panel -->
  <aside class="panel">
    <h2>Vista clínica (en vivo)</h2>
    <div id="cards"></div>
  </aside>
</div>

<script>
const CAT = { scratching: "rascado", observed_scratching: "rascado", sleep: "sueño",
  exposure: "exposición", irritability: "irritabilidad", temperature: "temperatura" };
const SAFETY = {
  continue_recording: { cls: "green", txt: "Seguir observando" },
  contact_clinician: { cls: "amber", txt: "Contactar al pediatra" },
  urgent_care: { cls: "red", txt: "Atención médica urgente" },
};
const SUGGESTIONS = [
  "Anoche durmió mejor y casi no se rascó",
  "Volvimos a probar el jabón nuevo en el baño",
  "Se rascó muchísimo y no durmió nada",
  "Tiene fiebre de 39 y la noto decaída",
  "/report",
];

const $ = (id) => document.getElementById(id);

function bubble(turn) {
  const b = document.createElement("div");
  b.className = "bubble " + (turn.role === "caregiver" ? "caregiver" : "lumi");
  b.innerHTML = `<div class="who">${turn.role === "caregiver" ? "Cuidadora" : "Lumi"}</div>` +
    escapeHtml(turn.text);
  return b;
}
function escapeHtml(s) {
  return (s || "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}
function renderTranscript(turns) {
  const stream = $("stream");
  stream.innerHTML = "";
  turns.forEach((t) => stream.appendChild(bubble(t)));
  stream.scrollTop = stream.scrollHeight;
}

function renderPanel(s) {
  const c = $("cards");
  if (!s || !s.alias) { c.innerHTML = "<p class='muted'>Sin datos.</p>"; return; }
  const parts = [];

  // Plan
  parts.push(card(`Plan prescrito activo`, `v${s.plan_version ?? "—"}`,
    s.active_plan_items.length
      ? `<ul class="clean">${s.active_plan_items.map((i) => `<li>• ${escapeHtml(i)}</li>`).join("")}</ul>`
      : `<span class="muted">Sin plan activo</span>`));

  // Adherence
  const maxN = Math.max(1, ...s.adherence.map((a) => a.count));
  parts.push(card(`Adherencia observada`, ``,
    s.adherence.length
      ? s.adherence.map((a) => `<div class="adh"><span class="lbl">${escapeHtml(a.text)}</span>
          <span class="bar"><span style="width:${(a.count / maxN) * 100}%"></span></span>
          <span class="n">${a.count} registro${a.count === 1 ? "" : "s"}</span></div>`).join("")
      : `<span class="muted">Sin datos</span>`));

  // Safety
  const sem = s.safety ? SAFETY[s.safety.disposition] : null;
  parts.push(card(`Seguridad (política de banderas rojas)`, ``,
    sem
      ? `<div class="semaforo"><span class="dot ${sem.cls}"></span>
         <span class="txt"><b>${sem.txt}</b><br><span class="muted">${escapeHtml(s.safety.message)}</span></span></div>`
      : `<span class="muted">Sin evaluaciones</span>`));

  // Evolution sparkline (sleep/discomfort points over time)
  if (s.evolution.length) {
    const bars = s.evolution.map((_, i) =>
      `<span style="height:${30 - (i % 4) * 6 + 8}px" title=""></span>`).join("");
    const rows = s.evolution.slice(-5).map((e) =>
      `<div class="evrow"><span class="d">${e.date}</span> · ${CAT[e.category] || e.category}: ${escapeHtml(e.note)}</div>`).join("");
    parts.push(card(`Evolución observada`, `${s.evolution.length} registros`,
      `<div class="spark">${bars}</div>${rows}`));
  }

  // Patterns
  parts.push(card(`Patrones longitudinales`, `a validar`,
    s.patterns.length
      ? s.patterns.map((p) => `<div class="pattern"><span class="tag">${p.status.replace("_", " ")}</span>${escapeHtml(p.rendered)}</div>`).join("")
      : `<span class="muted">Aún observando — sin patrones repetidos todavía.</span>`));

  // Non-prescribed
  if (s.non_prescribed.length) {
    parts.push(card(`Productos no prescritos`, ``,
      `<ul class="clean">${s.non_prescribed.map((t) => `<li>• ${escapeHtml(t)}</li>`).join("")}</ul>`));
  }

  // Report
  parts.push(`<div class="card"><a class="reportbtn" href="/api/report" target="_blank">Ver reporte clínico</a>
    <div class="disc">Reporte informativo. No es un diagnóstico ni reemplaza el criterio del médico tratante.</div></div>`);

  c.innerHTML = parts.join("");
}

function card(title, pill, body) {
  return `<div class="card"><div class="title"><span>${title}</span>${pill ? `<span class="pill">${pill}</span>` : ""}</div>${body}</div>`;
}

async function load() {
  const r = await fetch("/api/snapshot").then((x) => x.json());
  $("aiflag").textContent = r.ai ? "IA Azure: activa" : "IA: desactivada";
  renderTranscript(r.transcript);
  renderPanel(r.snapshot);
}

async function send(text) {
  if (!text.trim()) return;
  $("text").value = "";
  const stream = $("stream");
  stream.appendChild(bubble({ role: "caregiver", text }));
  stream.scrollTop = stream.scrollHeight;
  const r = await fetch("/api/message", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text }),
  }).then((x) => x.json());
  stream.appendChild(bubble({ role: "lumi", text: r.reply }));
  stream.scrollTop = stream.scrollHeight;
  renderPanel(r.snapshot);
}

function renderChips() {
  $("chips").innerHTML = "";
  SUGGESTIONS.forEach((t) => {
    const el = document.createElement("span");
    el.className = "chip"; el.textContent = t;
    el.onclick = () => { $("text").value = t; $("text").focus(); };
    $("chips").appendChild(el);
  });
}

$("form").addEventListener("submit", (e) => { e.preventDefault(); send($("text").value); });
$("reset").addEventListener("click", async () => {
  const r = await fetch("/api/reset", { method: "POST" }).then((x) => x.json());
  renderTranscript(r.transcript); renderPanel(r.snapshot);
});

renderChips();
load();
</script>
</body>
</html>
