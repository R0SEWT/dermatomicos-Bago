version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns:
          - "*"
    # setuptools<81 está pineado a propósito: tensorflow_hub importa pkg_resources,
    # removido en setuptools 82. No dejar que Dependabot lo suba.
    ignore:
      - dependency-name: "setuptools"
